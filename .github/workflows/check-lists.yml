name: Validate Filter Lists

on:
  push:
    paths:
      - 'admin/presets_list.go'
      - '.github/workflows/check-lists.yml'
  pull_request:
    paths:
      - 'admin/presets_list.go'
  schedule:
    # Run once a week to detect dead URLs automatically
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-urls:
    name: Check URL Availability
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: admin/go.mod
          cache-dependency-path: admin/go.sum

      - name: Run List Validation Test
        run: |
          cd admin
          go test -v presets_test.go presets_list.go models.go
