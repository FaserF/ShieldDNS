name: Validate Filter Lists

on:
  push:
    paths:
      - 'admin/presets_list.go'
      - '.github/workflows/check-lists.yml'
  pull_request:
    paths:
      - 'admin/presets_list.go'
  schedule:
    # Run once a week to detect dead URLs automatically
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  validate-urls:
    name: Check URL Availability
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26.2'

      - name: Run List Validation Test
        run: |
          cd admin
          go test -v presets_test.go presets_list.go models.go
