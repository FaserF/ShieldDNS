name: Validate Filter Lists

on:
  push:
    paths:
      - 'admin/presets_list.go'
      - '.github/workflows/check-lists.yml'
  pull_request:
    paths:
      - 'admin/presets_list.go'
  schedule:
    # Run once a week to detect dead URLs automatically
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-urls:
    name: Check URL Availability
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: admin/go.mod
          cache-dependency-path: admin/go.sum

      - name: Run List Validation Test
        run: |
          cd admin
          go test -v presets_test.go presets_list.go models.go
