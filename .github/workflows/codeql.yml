name: "CodeQL"

on:
  push:
    branches: ["main", "master"]
    paths-ignore:
      - "README.md"
      - "docs/**"
      - "*.md"
      - "project_manifest.json"
      - "project_connections.json"
      - ".github/workflows/**"
  pull_request:
    branches: ["main", "master"]
    paths-ignore:
      - "README.md"
      - "docs/**"
      - "*.md"
      - "project_manifest.json"
      - "project_connections.json"
      - ".github/workflows/**"
  schedule:
    - cron: '30 1 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-codeql
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['go', 'javascript-typescript']

    steps:
      - name: Check if GitHub Advanced Security is enabled
        id: check_ghas
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          STATUS=$(gh api repos/$REPO --jq '.security_and_analysis.advanced_security.status // "disabled"' 2>/dev/null || echo "disabled")
          if [ "$STATUS" = "enabled" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "✅ GitHub Advanced Security is enabled — CodeQL will run."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ GitHub Advanced Security is not enabled. CodeQL analysis will be skipped."
          fi

      - name: Checkout repository
        if: steps.check_ghas.outputs.enabled == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        if: steps.check_ghas.outputs.enabled == 'true'
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        if: steps.check_ghas.outputs.enabled == 'true'
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

      - name: Perform CodeQL Analysis
        if: steps.check_ghas.outputs.enabled == 'true'
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{matrix.language}}"
