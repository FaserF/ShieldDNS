name: PR Automation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-pr-auto
  cancel-in-progress: true

jobs:
  automate:
    name: PR Automation Tasks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.head.repo.fork == false && github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    steps:
      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Fix line endings (CRLF → LF) in shell scripts
        run: |
          find . -name "*.sh" ! -path "./.git/*" ! -path "./node_modules/*" -exec sed -i 's/\r$//' {} +

      - name: Commit auto-fixes
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          commit_message: "style: fix line endings in shell scripts"
          branch: ${{ github.head_ref }}
          file_pattern: "*.sh"
