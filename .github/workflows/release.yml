name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Type of release (stable, beta, dev)"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - beta
          - dev
      increment_level:
        description: "Increment level (major, minor, patch, none. Use 'none' to increment pre-release suffix e.g. b0 -> b1)"
        required: true
        default: "patch"
        type: choice
        options:
          - major
          - minor
          - patch
          - none
      version_override:
        description: "Target base version (optional, e.g. 1.9.0)"
        required: false
        type: string
      re_release:
        description: "Re-Release current version (deletes existing release, tag, and docker image first)"
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: faserf/shielddns

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-release
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.14.6'

      - name: Calculate Version & Generate Changelog
        id: get_version
        shell: pwsh
        env:
          RELEASE_TYPE: ${{ github.event.inputs.release_type }}
          INCREMENT_LEVEL: ${{ github.event.inputs.increment_level }}
          VERSION_OVERRIDE: ${{ github.event.inputs.version_override }}
          RE_RELEASE: ${{ github.event.inputs.re_release }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $type = $env:RELEASE_TYPE
          $level = $env:INCREMENT_LEVEL
          $re_release = $env:RE_RELEASE -eq "true"
          $repo = $env:REPO.ToLower()
          
          # 1. Get the latest tag (matching vX.Y.Z...) from GitHub API
          $latest_tag = ""
          if ($env:GITHUB_TOKEN) {
            try {
              $latest_tag = gh api repos/$repo/tags --jq '.[].name' 2>$null | Where-Object { $_ -match '^v?\d+\.\d+\.\d+(?:(?:b|-dev)\d+)?$' } | Select-Object -First 1
            } catch {
              Write-Host "Warning: Failed to fetch tags from GitHub API, falling back to git tags."
            }
          }

          # Fallback to local git tags
          if ([string]::IsNullOrEmpty($latest_tag)) {
            $latest_tag = git tag -l "[0-9]*" "v[0-9]*" --sort=-v:refname | Where-Object { $_ -match '^v?\d+\.\d+\.\d+(?:(?:b|-dev)\d+)?$' } | Select-Object -First 1
          }

          Write-Host "Latest detected tag: $latest_tag"

          if ($latest_tag -match '^v?(\d+)\.(\d+)\.(\d+)(?:(b|-dev)(\d+))?') {
            $latest_major = [int]$matches[1]
            $latest_minor = [int]$matches[2]
            $latest_patch = [int]$matches[3]
            $latest_pre_type = $matches[4] # "b" or "-dev" or $null
            $latest_pre_num = if ($matches[5] -ne $null) { [int]$matches[5] } else { $null }
          } else {
            # Fall back to hardcoded default
            $latest_major = 1; $latest_minor = 9; $latest_patch = 0
            $latest_pre_type = $null
            $latest_pre_num = $null
          }

          $version = ""; $tag = ""; $is_prerelease = "false"; $original_release_date = ""

          if ($re_release) {
            if ([string]::IsNullOrEmpty($latest_tag)) {
              Write-Error "No existing tag/release found to re-release."
              exit 1
            }
            $tag = $latest_tag
            $version = $tag -replace '^v', ''
            if ($version -match 'b\d+' -or $version -match '-dev' -or $version -match '-rc' -or $version -match '-beta' -or $version -match '-alpha') {
              $is_prerelease = "true"
            } else {
              $is_prerelease = "false"
            }
            
            if ($env:GITHUB_TOKEN) {
              try {
                $release_info = gh api "repos/$repo/releases/tags/$tag" | ConvertFrom-Json
                $original_release_date = $release_info.published_at
              } catch {}
            }

            # Find previous tag for changelog
            $prev_tag = ""
            if ($env:GITHUB_TOKEN) {
              try {
                $prev_tag = gh api repos/$repo/tags --jq '.[].name' 2>$null | Where-Object { $_ -match '^v?\d+\.\d+\.\d+(?:(?:b|-dev)\d+)?$' } | Select-Object -Skip 1 -First 1
              } catch {}
            }
            if ([string]::IsNullOrEmpty($prev_tag)) {
              $prev_tag = git tag -l "[0-9]*" "v[0-9]*" --sort=-v:refname | Where-Object { $_ -match '^v?\d+\.\d+\.\d+(?:(?:b|-dev)\d+)?$' } | Select-Object -Skip 1 -First 1
            }
            $changelog_from = $prev_tag
            $changelog_label = if ($prev_tag) { "since previous release (``$prev_tag``) due to re-release of ``$tag``" } else { "initial release — full history" }
          } else {
            # Determine base version
            $base_major = $latest_major
            $base_minor = $latest_minor
            $base_patch = $latest_patch

            if ($level -eq "major") {
              if ($latest_pre_type -and $latest_minor -eq 0 -and $latest_patch -eq 0) {
                # Don't double increment if already a major pre-release
              } else {
                $base_major++
                $base_minor = 0
                $base_patch = 0
              }
            } elseif ($level -eq "minor") {
              if ($latest_pre_type -and $latest_patch -eq 0) {
                # Don't double increment if already a minor pre-release
              } else {
                $base_minor++
                $base_patch = 0
              }
            } elseif ($level -eq "patch") {
              if ($latest_pre_type) {
                # Don't double increment if already a pre-release
              } else {
                $base_patch++
              }
            }

            $base_version = "$base_major.$base_minor.$base_patch"
            if (![string]::IsNullOrEmpty($env:VERSION_OVERRIDE)) { $base_version = $env:VERSION_OVERRIDE }

            if ($type -eq "stable") {
              $version = $base_version
              $tag = "v$version"
              $is_prerelease = "false"
            } else {
              $is_prerelease = "true"
              $prefix = if ($type -eq "beta") { "b" } else { "-dev" }

              if ($latest_pre_type -eq $prefix -and "$latest_major.$latest_minor.$latest_patch" -eq $base_version) {
                $next_n = $latest_pre_num + 1
              } else {
                $pattern = "v$($base_version)$($prefix)*"
                $tags = git tag -l $pattern
                $max_n = -1
                if ($tags) {
                  foreach ($t in $tags) {
                    if ($t -match "$($prefix)(\d+)") {
                      $n = [int]$matches[1]
                      if ($n -gt $max_n) { $max_n = $n }
                    }
                  }
                }
                $next_n = $max_n + 1
              }

              if ($type -eq "beta") {
                $version = "$($base_version)b$next_n"
                $tag = "v$version"
              } else {
                $sha = git rev-parse --short HEAD
                $version = "$($base_version)-dev$($next_n)+$sha"
                $tag = "v$version"
              }
            }

            # Determine changelog base tag
            $changelog_from = ""
            $changelog_label = "initial release — full history"

            if ($type -eq "stable") {
              $stableTag = git tag -l --sort=-v:refname 2>$null | Where-Object { $_ -match '^v?\d+\.\d+\.\d+$' } | Select-Object -First 1
              if ($stableTag) {
                $changelog_from = $stableTag
                $changelog_label = "since last stable release (``$stableTag``)"
              }
            } elseif ($type -eq "beta") {
              $prevBeta = git tag -l "v${base_version}b*" --sort=-v:refname 2>$null | Where-Object { $_ -match "^v?${base_version}b\d+$" } | Select-Object -First 1
              if ($prevBeta) {
                $changelog_from = $prevBeta
                $changelog_label = "since previous beta (``$prevBeta``)"
              } else {
                $stableTag = git tag -l --sort=-v:refname 2>$null | Where-Object { $_ -match '^v?\d+\.\d+\.\d+$' } | Select-Object -First 1
                if ($stableTag) {
                  $changelog_from = $stableTag
                  $changelog_label = "since last stable release (``$stableTag``) — first beta of $base_version"
                }
              }
            } else {
              if ($latest_tag) {
                $changelog_from = $latest_tag
                $changelog_label = "since ``$latest_tag``"
              }
            }
          }

          $docker_tag = $version -replace '\+', '.'

          Write-Host "Changelog base: '$changelog_from' ($changelog_label)"

          # Count commits
          $totalCommitCount = 0
          try {
            $countRange = if ($changelog_from) { "${changelog_from}..HEAD" } else { "HEAD" }
            $totalCommitCount = [int](git rev-list --count $countRange 2>$null)
          } catch { $totalCommitCount = 0 }

          # Generate changelog via Python script
          $changelogMd = ""
          $changelogScript = Join-Path $PWD ".github/scripts/generate_changelog.py"
          if (Test-Path $changelogScript) {
            try {
              $clArgs = @(
                "--from-tag", $changelog_from,
                "--total-commits", [string]$totalCommitCount,
                "--repo", $repo
              )
              $changelogLines = python $changelogScript @clArgs 2>$null
              $changelogMd = if ($changelogLines) { $changelogLines -join "`n" } else { "_No categorised changes detected._" }
            } catch {
              $changelogMd = "_Changelog could not be generated automatically._"
            }
          } else {
            $changelogMd = "_Changelog script not found._"
          }

          # Release risk analysis
          $diffRange = if ($changelog_from) { "${changelog_from}..HEAD" } else { "HEAD" }
          $changedFiles = @()
          try { $changedFiles = git diff --name-only $diffRange 2>$null } catch {}
          $totalFiles = if ($changedFiles) { $changedFiles.Count } else { 0 }
          
          $backendCount = 0; $frontendCount = 0; $ciCount = 0; $docsCount = 0
          foreach ($f in $changedFiles) {
            if ($f -match '^admin/.*\.go$') { $backendCount++ }
            elseif ($f -match '^admin/www/') { $frontendCount++ }
            elseif ($f -match '^\.github/' -or $f -match '^scripts/' -or $f -match '^Dockerfile$') { $ciCount++ }
            elseif ($f -match '^docs/' -or $f -match '\.md$') { $docsCount++ }
          }

          $severity = "Standard"
          $alertType = "NOTE"
          $preamble = "This release introduces minor updates."
          if ($totalFiles -gt 40 -or $type -ne "stable") {
            $severity = "Standard"
            $alertType = "NOTE"
          }

          $impactSummary = [System.Collections.Generic.List[string]]::new()
          if ($totalFiles -gt 0) {
            if ($backendCount -gt 0) { $pct = [math]::Round(($backendCount / $totalFiles) * 100); $impactSummary.Add("⚙️ Go Backend ($backendCount files · $pct%)") }
            if ($frontendCount -gt 0) { $pct = [math]::Round(($frontendCount / $totalFiles) * 100); $impactSummary.Add("💻 Admin UI ($frontendCount files · $pct%)") }
            if ($ciCount -gt 0) { $pct = [math]::Round(($ciCount / $totalFiles) * 100); $impactSummary.Add("🚀 CI/CD ($ciCount files · $pct%)") }
            if ($docsCount -gt 0) { $pct = [math]::Round(($docsCount / $totalFiles) * 100); $impactSummary.Add("📖 Docs ($docsCount files · $pct%)") }
          }
          $impactStr = if ($impactSummary.Count -gt 0) { $impactSummary -join "  ·  " } else { "No codebase changes detected." }

          # Build Risk Warning Block
          $noteParts = [System.Collections.Generic.List[string]]::new()
          $noteParts.Add("> [!$alertType]")
          $noteParts.Add("> **Release Risk: $severity**")
          $noteParts.Add("> $preamble")
          $noteParts.Add(">")
          $noteParts.Add("> **Affected areas:** $impactStr")
          $prereleaseNote = "`n" + ($noteParts -join "`n") + "`n"

          # Assemble full body
          $bodyParts = [System.Collections.Generic.List[string]]::new()
          $bodyParts.Add("# ShieldDNS $version")
          $bodyParts.Add("")
          $bodyParts.Add($prereleaseNote)
          $bodyParts.Add("## 📋 What's Changed")
          $bodyParts.Add("")
          $bodyParts.Add($changelogMd)
          $bodyParts.Add("")
          $bodyParts.Add("## 🐳 Docker Image")
          $bodyParts.Add("Official image available at: ``ghcr.io/${repo}:$docker_tag``")
          $bodyParts.Add("")
          
          # Add Re-Release notice if applicable
          if ($re_release -and $original_release_date) {
            $dateTime = [DateTime]::Parse($original_release_date).ToString("yyyy-MM-dd HH:mm:ss UTC")
            $notice = "> [!NOTE]`n> **Re-Release Notice**`n> This version was previously released on $dateTime.`n> The release, tag, and docker image were deleted and recreated."
            $bodyParts.Add($notice)
            $bodyParts.Add("")
          }

          $body = $bodyParts -join "`n"
          $body | Out-File -FilePath "CHANGELOG_BODY.md" -Encoding utf8

          # Outputs
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "docker_tag=$docker_tag" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "is_prerelease=$is_prerelease" >> $env:GITHUB_OUTPUT
          echo "original_release_date=$original_release_date" >> $env:GITHUB_OUTPUT

      - name: Re-Release - Delete existing release, tag and Docker image
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.re_release == 'true' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.get_version.outputs.tag }}"
          $repo = "${{ github.repository }}"
          $orgOrUser = $repo.Split("/")[0]
          $repoName = ($repo.Split("/")[1]).ToLower()

          Write-Host "Running Re-Release for tag $tag..."

          # 1. Delete GitHub release if exists
          try {
            $releaseJson = gh api "repos/$repo/releases/tags/$tag" 2>$null
            if ($LASTEXITCODE -eq 0 -and $releaseJson) {
              $release = $releaseJson | ConvertFrom-Json
              if ($release -and $release.id) {
                Write-Host "Deleting release id $($release.id) for tag $tag"
                gh api -X DELETE "repos/$repo/releases/$($release.id)" 2>$null | Out-Null
              }
            }
          } catch {
            Write-Host "No release found to delete or error: $_"
          }

          # 2. Delete remote tag
          try {
            Write-Host "Deleting remote tag $tag"
            git push origin --delete $tag 2>$null
          } catch {
            Write-Host "Failed to delete remote tag: $_"
          }

          # 3. Delete local tag
          if (git tag -l $tag) {
            Write-Host "Deleting local tag $tag"
            git tag -d $tag
          }

          # 4. Delete GHCR Docker package version matching docker_tag
          $docker_tag = "${{ steps.get_version.outputs.docker_tag }}"
          Write-Host "Checking for GHCR package version matching docker_tag: $docker_tag in package: $repoName"
          $versions = @()

          # Try Org package versions
          $versionsJson = gh api "orgs/$orgOrUser/packages/container/$repoName/versions" 2>$null
          if ($LASTEXITCODE -eq 0 -and $versionsJson) {
            $versions = $versionsJson | ConvertFrom-Json
          } else {
            Write-Host "Failed to fetch org package versions or package does not exist. Trying user packages..."
            $versionsJson = gh api "users/$orgOrUser/packages/container/$repoName/versions" 2>$null
            if ($LASTEXITCODE -eq 0 -and $versionsJson) {
              $versions = $versionsJson | ConvertFrom-Json
            } else {
              Write-Host "Failed to fetch user package versions or package does not exist."
            }
          }

          foreach ($v in $versions) {
            if ($v.metadata.container.tags -contains $docker_tag) {
              Write-Host "Deleting package version $($v.id) tagged with $docker_tag"
              # Try deleting org package first
              gh api -X DELETE "orgs/$orgOrUser/packages/container/$repoName/versions/$($v.id)" 2>$null | Out-Null
              if ($LASTEXITCODE -ne 0) {
                # Try deleting user package
                gh api -X DELETE "users/$orgOrUser/packages/container/$repoName/versions/$($v.id)" 2>$null | Out-Null
              }
            }
          }

      - name: 🛠️ Sync Versions & Run Stats Collection
        shell: pwsh
        env:
          NEW_VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          $ver = $env:NEW_VERSION
          $base_version = $ver
          if ($ver -match '^(\d+\.\d+\.\d+)') {
            $base_version = $Matches[1]
          }

          # Update VERSION file
          $base_version | Out-File -FilePath "VERSION" -Encoding utf8 -NoNewline

          # Update admin/main.go constants
          $mainGoPath = "admin/main.go"
          if (Test-Path $mainGoPath) {
             $content = Get-Content $mainGoPath -Raw
             $content = $content -replace 'Version\s*=\s*"[^"]+"', "Version        = `"v$ver`""
             $content = $content -replace 'Subversion\s*=\s*"[^"]+"', 'Subversion = "0"'
             $content | Out-File $mainGoPath -Encoding utf8 -NoNewline
          }

          # Run collect stats
          python .github/scripts/collect_stats.py

      - name: Commit version and static assets
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add VERSION admin/main.go admin/www/admin/assets/project_stats.json admin/www/admin/assets/contributors.json admin/www/admin/assets/contributors_fallback.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: release version ${{ steps.get_version.outputs.version }} [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

          # Tag creation
          if git rev-parse "${{ steps.get_version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag exists. Skip creation."
          else
            git tag ${{ steps.get_version.outputs.tag }}
            git push origin ${{ steps.get_version.outputs.tag }}
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to the Container registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.docker_tag }}

      - name: Create Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: Release ${{ steps.get_version.outputs.version }}
          body_path: CHANGELOG_BODY.md
          draft: false
          prerelease: ${{ steps.get_version.outputs.is_prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
