name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      recreate_release:
        description: 'Recreate existing release (no version bump)'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: faserf/shielddns

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🛠️ Ensure LF Line Endings & Correct Version
        id: versioning
        run: |
          # 1. Force Unix line endings on all relevant files
          find . -type f \( -name "*.sh" -o -name "Dockerfile" -o -name "*.go" -o -name "*.json" -o -name "*.yml" \) -print0 | xargs -0 sed -i 's/\r$//'

          # 2. Handle Versioning
          if [ "${{ github.event.inputs.recreate_release }}" = "true" ]; then
            echo "Recreating existing release. Skipping version bump."
            VERSION=$(grep -oP 'Version\s*=\s*"v\K[^"]+' admin/main.go)
          else
            python .github/scripts/bump_version.py ${{ github.event.inputs.bump_type }}
            VERSION=$(grep -oP 'Version\s*=\s*"v\K[^"]+' admin/main.go)
          fi
          echo "NEW_VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 📝 Build Changelog
        id: build_changelog
        run: |
          # Get the previous tag (if any)
          PREV_TAG=$(git tag --list --sort=-v:refname | head -n 1 || echo "")
          python .github/scripts/generate_changelog.py "$PREV_TAG"

      - name: Create Release Tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Only commit if we actually bumped the version
          if [ "${{ github.event.inputs.recreate_release }}" != "true" ]; then
            git add admin/main.go
            if ! git diff --staged --quiet; then
              git commit -m "chore: bump version to v${{ env.NEW_VERSION }} [skip ci]"
            fi
            git pull --rebase origin main
          fi
          
          # Handle Tag Recreation
          if git rev-parse "v${{ env.NEW_VERSION }}" >/dev/null 2>&1; then
            if [ "${{ github.event.inputs.recreate_release }}" = "true" ]; then
              echo "Force-pushing existing tag v${{ env.NEW_VERSION }}"
              git tag -f v${{ env.NEW_VERSION }}
              git push origin v${{ env.NEW_VERSION }} -f
            else
              echo "Error: Tag v${{ env.NEW_VERSION }} already exists but re-release was not selected."
              exit 1
            fi
          else
            git tag v${{ env.NEW_VERSION }}
            git push origin main --tags
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ env.NEW_VERSION }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.NEW_VERSION }}
          name: Release v${{ env.NEW_VERSION }}
          body_path: CHANGELOG_BODY.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
