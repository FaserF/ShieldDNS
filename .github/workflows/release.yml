name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      recreate_release:
        description: 'Recreate existing release (no version bump)'
        required: false
        default: false
        type: boolean
      prerelease:
        description: 'Mark as Pre-release'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: faserf/shielddns

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14.4'

      - name: 🛠️ Ensure LF Line Endings & Correct Version
        id: versioning
        run: |
          # 1. Force Unix line endings on all relevant files
          find . -type f \( -name "*.sh" -o -name "Dockerfile" -o -name "*.go" -o -name "*.json" -o -name "*.yml" \) -print0 | xargs -0 sed -i 's/\r$//'

          # 2. Handle Versioning
          if [ "${{ github.event.inputs.recreate_release }}" = "true" ]; then
            echo "Recreating existing release. Skipping version bump."
            VERSION=$(grep -oP 'Version\s*=\s*"v\K[^"]+' admin/main.go)
          else
            python .github/scripts/bump_version.py ${{ github.event.inputs.bump_type }}
            # Reset Subversion to 0 on release
            sed -i 's/Subversion = "[^"]*"/Subversion = "0"/' admin/main.go
            VERSION=$(grep -oP 'Version\s*=\s*"v\K[^"]+' admin/main.go)
          fi
          echo "NEW_VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 📝 Build Changelog
        id: build_changelog
        run: |
          # Get the previous tag (if any)
          PREV_TAG=$(git tag --list --sort=-v:refname | head -n 1 || echo "")
          python .github/scripts/generate_changelog.py "$PREV_TAG"

      - name: Create Release Tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Only commit if we actually bumped the version
          if [ "${{ github.event.inputs.recreate_release }}" != "true" ]; then
            git add admin/main.go
            if ! git diff --staged --quiet; then
              git commit -m "chore: bump version to v${{ env.NEW_VERSION }} [skip ci]"
            fi
            git pull --rebase origin main
          fi
          
          # Handle Tag Recreation
          if git rev-parse "v${{ env.NEW_VERSION }}" >/dev/null 2>&1; then
            if [ "${{ github.event.inputs.recreate_release }}" = "true" ]; then
              echo "Force-pushing existing tag v${{ env.NEW_VERSION }}"
              git tag -f v${{ env.NEW_VERSION }}
              git push origin v${{ env.NEW_VERSION }} -f
            else
              echo "Error: Tag v${{ env.NEW_VERSION }} already exists but re-release was not selected."
              exit 1
            fi
          else
            git tag v${{ env.NEW_VERSION }}
            git push origin main --tags
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🗑️ Delete existing Docker image version (if any)
        if: github.event.inputs.recreate_release == 'true'
        run: |
          PACKAGE_NAME="${{ env.IMAGE_NAME }}"
          VERSION_TAG="v${{ env.NEW_VERSION }}"
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          # Try to find version ID for the tag. Since we don't know if it's org or user, we try one first.
          # Based on common ShieldDNS usage, it's likely a user.
          echo "Checking for existing version $VERSION_TAG of $PACKAGE_NAME..."
          
          # Try Org first, then User if not found/error
          VERSION_ID=$(gh api "orgs/${OWNER_LC}/packages/container/${PACKAGE_NAME//\//%2F}/versions" --paginate -q ".[] | select(.metadata.container.tags[] == \"$VERSION_TAG\") | .id" 2>/dev/null || \
                      gh api "users/${OWNER_LC}/packages/container/${PACKAGE_NAME//\//%2F}/versions" --paginate -q ".[] | select(.metadata.container.tags[] == \"$VERSION_TAG\") | .id" 2>/dev/null || echo "")
          
          if [ -n "$VERSION_ID" ]; then
            echo "Deleting existing version $VERSION_TAG (ID: $VERSION_ID)"
            # Try Org delete then User delete
            gh api -X DELETE "orgs/${OWNER_LC}/packages/container/${PACKAGE_NAME//\//%2F}/versions/$VERSION_ID" 2>/dev/null || \
            gh api -X DELETE "users/${OWNER_LC}/packages/container/${PACKAGE_NAME//\//%2F}/versions/$VERSION_ID" 2>/dev/null || echo "Failed to delete via API, push will overwrite."
          else
            echo "No existing version found for $VERSION_TAG"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ env.NEW_VERSION }}

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: v${{ env.NEW_VERSION }}
          name: Release v${{ env.NEW_VERSION }}
          body_path: CHANGELOG_BODY.md
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Bump to next Development Version
        if: github.event.inputs.recreate_release != 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Use our updated script to bump to the next patch version with a -dev suffix
          # We use the short SHA to identify the dev build base
          SHORT_SHA=$(git rev-parse --short HEAD)
          python .github/scripts/bump_version.py patch "-dev+${SHORT_SHA}"
          
          DEV_VERSION=$(grep -oP 'Version\s*=\s*"v\K[^"]+' admin/main.go)
          echo "Bumping main branch to development version: v$DEV_VERSION"
          
          git add admin/main.go
          git commit -m "chore: pivot to development v$DEV_VERSION [skip ci]"
          git push origin main
