name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  go-tests:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: admin/go.mod
          cache-dependency-path: admin/go.sum

      - name: Run Go Tests
        working-directory: admin
        run: go test -v -race -count=1 ./...

  build-and-test:
    name: Docker Build & Integration Test
    runs-on: ubuntu-latest
    needs: go-tests
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: shielddns:test

      - name: Generate Self-Signed Certs for Testing
        run: |
          mkdir ssl
          openssl req -x509 -newkey rsa:4096 -keyout ssl/privkey.pem -out ssl/fullchain.pem -days 365 -nodes -subj "/CN=localhost"

      - name: Start Container
        run: |
          docker run -d --name shielddns -p 853:853 -v ${{ github.workspace }}/ssl:/ssl -e UPSTREAM_DNS=8.8.8.8 -e CERT_FILE=/ssl/fullchain.pem -e KEY_FILE=/ssl/privkey.pem shielddns:test
          sleep 10

      - name: Check Container Status & Logs
        run: |
          # Wait up to 60 seconds for CoreDNS to start (first boot downloads blocklists & GeoIP)
          for i in {1..12}; do
            if docker logs shielddns 2>&1 | grep -q 'Starting CoreDNS...'; then
              echo 'CoreDNS has started.'
              break
            fi
            echo 'Waiting for CoreDNS to start...'
            sleep 5
          done
          
          docker ps -a
          docker logs shielddns

      - name: Verify DNS Resolution (DoT)
        run: |
          # Install kdig (part of knot-utils in Ubuntu)
          sudo apt-get update && sudo apt-get install -y knot-dnsutils

          # Query localhost on port 853 using DoT
          # We disable cert verification (+tls-ca) because we used a self-signed cert
          kdig -d @127.0.0.1 -p 853 +tls-hostname=localhost +tls-ca=ssl/fullchain.pem google.com

          # Explicit success check
          if kdig -d @127.0.0.1 -p 853 +tls-hostname=localhost +tls-ca=ssl/fullchain.pem google.com | grep -q "NOERROR"; then
            echo "✅ DNS Resolution Successful"
          else
            echo "❌ DNS Resolution Failed"
            exit 1
          fi

  ui-layout-enforcement:
    name: UI Layout Enforcement
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and Start Container
        run: |
          mkdir ssl
          openssl req -x509 -newkey rsa:4096 -keyout ssl/privkey.pem -out ssl/fullchain.pem -days 365 -nodes -subj "/CN=localhost"
          docker build -t shielddns:test .
          docker run -d --name shielddns -p 8080:8080 -v ${{ github.workspace }}/ssl:/ssl shielddns:test
          sleep 10
      - name: Wait for Admin UI
        run: |
          for i in {1..20}; do
            if curl -s http://localhost:8080/admin/index.html | grep -q "ShieldDNS"; then
              echo "Admin UI is up."
              break
            fi
            echo "Waiting for Admin UI..."
            sleep 2
          done
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install-deps
          npx playwright install chromium
      - name: Run Layout Verification
        run: |
          cat << 'EOF' > verify_layout.js
          const { chromium } = require('playwright');
          (async () => {
              const browser = await chromium.launch();
              const page = await browser.newPage();
              const viewports = [{ width: 320, height: 568 }, { width: 375, height: 667 }, { width: 1200, height: 800 }];
              let failed = false;
              for (const vp of viewports) {
                  console.log(`Checking viewport: ${vp.width}x${vp.height}`);
                  await page.setViewportSize(vp);
                  // Append ?test=1 to load dev tools, though we can skip if we verify overflow directly
                  await page.goto('http://localhost:8080/admin/index.html');
                  await page.waitForLoadState('networkidle');
                  
                  const isOverflowing = await page.evaluate(() => {
                      return document.documentElement.scrollWidth > document.documentElement.clientWidth;
                  });
                  if (isOverflowing) {
                      console.error(`❌ Layout Failure: Horizontal overflow at ${vp.width}px.`);
                      failed = true;
                  } else {
                      console.log(`✅ No overflow at ${vp.width}px.`);
                  }
              }
              await browser.close();
              if (failed) process.exit(1);
          })();
          EOF
          node verify_layout.js
