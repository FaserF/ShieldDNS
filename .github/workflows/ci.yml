name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  go-tests:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: admin/go.mod
          cache-dependency-path: admin/go.sum

      - name: Run Go Tests
        working-directory: admin
        run: go test -v -race -count=1 ./...

  integration-tests:
    name: DNS & UI Integration Tests
    runs-on: ubuntu-latest
    needs: go-tests
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build Docker Image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          load: true
          tags: shielddns:test

      - name: Generate Self-Signed Certs for Testing
        run: |
          mkdir ssl
          openssl req -x509 -newkey rsa:4096 -keyout ssl/privkey.pem -out ssl/fullchain.pem -days 365 -nodes -subj "/CN=localhost"
          chmod -R 755 ssl
          chmod 644 ssl/*

      - name: Start Container
        run: |
          docker run -d --name shielddns -p 853:853 -p 8080:8080 -v ${{ github.workspace }}/ssl:/ssl -e UPSTREAM_DNS=8.8.8.8 -e CERT_FILE=/ssl/fullchain.pem -e KEY_FILE=/ssl/privkey.pem shielddns:test
          sleep 10

      - name: Check Container Status & Logs
        run: |
          # Wait up to 60 seconds for CoreDNS to start (first boot downloads blocklists & GeoIP)
          for i in {1..12}; do
            if docker logs shielddns 2>&1 | grep -q 'Starting CoreDNS...'; then
              echo 'CoreDNS has started.'
              break
            fi
            echo 'Waiting for CoreDNS to start...'
            sleep 5
          done
          
          docker ps -a
          docker logs shielddns

      - name: Verify DNS Resolution (DoT)
        run: |
          # Install dependencies for verification
          sudo apt-get update && sudo apt-get install -y knot-dnsutils net-tools

          # Wait for Port 853 to be active (Health Check)
          echo "Verifying DNS listener availability..."
          for i in {1..12}; do
            if nc -z 127.0.0.1 853; then
              echo "✅ Port 853 is listening."
              break
            fi
            echo "Waiting for Port 853..."
            sleep 5
            if [ $i -eq 12 ]; then
              echo "❌ Timeout waiting for Port 853."
              docker logs shielddns
              exit 1
            fi
          done

          # Query localhost on port 853 using DoT
          # We disable cert verification (+tls-ca) because we used a self-signed cert
          if ! kdig -d @127.0.0.1 -p 853 +tls-hostname=localhost +tls-ca=ssl/fullchain.pem google.com | grep -q "NOERROR"; then
            echo "❌ DNS Resolution Failed"
            echo "--- Container Network State (Netstat) ---"
            docker exec shielddns netstat -tunlp || true
            echo "--- Container Logs ---"
            docker logs shielddns
            exit 1
          fi
          echo "✅ DNS Resolution Successful"

      - name: Wait for Admin UI
        run: |
          for i in {1..20}; do
            if curl -s http://localhost:8080/admin/index.html | grep -q "ShieldDNS"; then
              echo "Admin UI is up."
              break
            fi
            echo "Waiting for Admin UI..."
            sleep 2
          done

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24.14.1

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install-deps
          npx playwright install chromium

      - name: Run Layout Verification
        run: |
          cat << 'EOF' > verify_layout.js
          const { chromium } = require('playwright');
          (async () => {
              const browser = await chromium.launch();
              const page = await browser.newPage();
              const viewports = [{ width: 320, height: 568 }, { width: 375, height: 667 }, { width: 1200, height: 800 }];
              
              console.log('Navigating to Admin UI...');
              // Navigate once at the beginning
              await page.goto('http://localhost:8080/admin/index.html', { waitUntil: 'load', timeout: 60000 });
              
              let failed = false;
              for (const vp of viewports) {
                  console.log(`Checking viewport: ${vp.width}x${vp.height}`);
                  await page.setViewportSize(vp);
                  // Brief settle time for responsive layout to adjust
                  await new Promise(r => setTimeout(r, 500));
                  
                  const isOverflowing = await page.evaluate(() => {
                      return document.documentElement.scrollWidth > document.documentElement.clientWidth;
                  });
                  if (isOverflowing) {
                      console.error(`❌ Layout Failure: Horizontal overflow at ${vp.width}px.`);
                      failed = true;
                  } else {
                      console.log(`✅ No overflow at ${vp.width}px.`);
                  }
              }
              await browser.close();
              if (failed) process.exit(1);
          })();
          EOF
          node verify_layout.js
