name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  go-tests:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: admin/go.mod
          cache-dependency-path: admin/go.sum

      - name: Run Go Tests
        working-directory: admin
        run: go test -v -race -count=1 ./...

  integration-tests:
    name: DNS & UI Integration Tests
    runs-on: ubuntu-latest
    needs: go-tests
    container:
      image: mcr.microsoft.com/playwright:v1.59.0-noble
      options: --user root -v /var/run/docker.sock:/var/run/docker.sock
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Docker CLI & DNS Tools
        run: |
          apt-get update && apt-get install -y docker.io knot-dnsutils net-tools curl openssl

      - name: Build Docker Image
        run: |
          docker build -t shielddns:test .

      - name: Generate Self-Signed Certs for Testing
        run: |
          mkdir ssl
          openssl req -x509 -newkey rsa:4096 -keyout ssl/privkey.pem -out ssl/fullchain.pem -days 365 -nodes -subj "/CN=localhost"
          chmod -R 755 ssl
          chmod 644 ssl/*

      - name: Start Container
        run: |
          # Get the network name of the current job container
          NETWORK_NAME=$(docker inspect $(hostname) -f '{{range $net,$v := .NetworkSettings.Networks}}{{$net}}{{end}}')
          echo "Joining network: $NETWORK_NAME"
          
          # Start ShieldDNS in the SAME network as the job runner
          docker run -d --name shielddns \
            --network "$NETWORK_NAME" \
            -v ${{ github.workspace }}/ssl:/ssl \
            -e UPSTREAM_DNS=8.8.8.8 \
            -e CERT_FILE=/ssl/fullchain.pem \
            -e KEY_FILE=/ssl/privkey.pem \
            -e DOH_PORT=8080 shielddns:test
          sleep 10

      - name: Check Container Status & Logs
        run: |
          for i in {1..12}; do
            if docker logs shielddns 2>&1 | grep -q 'Starting CoreDNS...'; then
              echo 'CoreDNS has started.'
              break
            fi
            echo 'Waiting for CoreDNS to start...'
            sleep 5
          done

          docker ps -a
          docker logs shielddns

      - name: Verify DNS Resolution (DoT)
        run: |
          echo "Verifying DNS listener availability..."
          for i in {1..12}; do
            # Use 'shielddns' hostname instead of 127.0.0.1
            if nc -z shielddns 853; then
              echo "✅ Port 853 is listening."
              break
            fi
            echo "Waiting for Port 853..."
            sleep 5
            if [ $i -eq 12 ]; then
              echo "❌ Timeout waiting for Port 853."
              docker logs shielddns
              exit 1
            fi
          done

          # Query 'shielddns' on port 853 using DoT
          if ! kdig -d @shielddns -p 853 +tls-hostname=localhost +tls-ca=ssl/fullchain.pem google.com | grep -q "NOERROR"; then
            echo "❌ DNS Resolution Failed"
            echo "--- Container logs ---"
            docker logs shielddns
            exit 1
          fi
          echo "✅ DNS Resolution Successful"

      - name: Wait for Admin UI
        run: |
          for i in {1..20}; do
            if curl -s http://shielddns:8080/admin/index.html | grep -q "ShieldDNS"; then
              echo "Admin UI is up."
              break
            fi
            echo "Waiting for Admin UI..."
            sleep 2
          done

      - name: Run Layout Verification
        run: |
          npm init -y
          npm install playwright
          cat << 'EOF' > verify_layout.js
          const { chromium } = require('playwright');

          async function testPage(url, pageName) {
              console.log(`\n========== Testing ${pageName} ==========`);
              const browser = await chromium.launch();
              const page = await browser.newPage();
              const viewports = [
                  { width: 320, height: 568, name: 'iPhone SE' },
                  { width: 375, height: 667, name: 'iPhone 6/7/8' },
                  { width: 1200, height: 800, name: 'Desktop' }
              ];

              console.log(`Navigating to ${pageName}...`);
              try {
                  await page.goto(url, { waitUntil: 'load', timeout: 60000 });
              } catch (err) {
                  console.error(`❌ Failed to load ${pageName}:`, err.message);
                  await browser.close();
                  return false;
              }

              let failed = false;
              const issues = [];

              for (const vp of viewports) {
                  console.log(`Checking viewport: ${vp.width}x${vp.height} (${vp.name})`);
                  await page.setViewportSize({ width: vp.width, height: vp.height });
                  // Slightly longer wait for charts/animations
                  await new Promise(r => setTimeout(r, 800));

                  const overflow = await page.evaluate(() => {
                      const scrollWidth = document.documentElement.scrollWidth;
                      const clientWidth = document.documentElement.clientWidth;

                      return {
                          hasOverflow: scrollWidth > clientWidth,
                          scrollWidth,
                          clientWidth
                      };
                  });

                  if (overflow.hasOverflow) {
                      console.error(`  ❌ Horizontal overflow at ${vp.width}px: ${overflow.scrollWidth}px vs ${overflow.clientWidth}px (${overflow.scrollWidth - overflow.clientWidth}px overflow)`);
                      issues.push({
                          viewport: `${vp.width}x${vp.height}`,
                          name: vp.name,
                          overflow: overflow.scrollWidth - overflow.clientWidth
                      });
                      failed = true;
                  } else {
                      console.log(`  ✅ No overflow at ${vp.width}px.`);
                  }
              }

              await browser.close();

              if (failed) {
                  console.error(`\n❌ ${pageName} layout verification FAILED!`);
                  issues.forEach(issue => {
                      console.error(`   - ${issue.viewport} (${issue.name}): ${issue.overflow}px overflow`);
                  });
              }
              return !failed;
          }

          (async () => {
              const results = [];
              // Use 'shielddns' as hostname
              results.push(await testPage('http://shielddns:8080/', 'Landing Page'));
              results.push(await testPage('http://shielddns:8080/admin/', 'Admin Dashboard'));

              if (results.every(r => r)) {
                  console.log('\n✅ All pages pass layout verification!');
                  process.exit(0);
              } else {
                  console.error('\n❌ Layout verification failed for one or more pages!');
                  process.exit(1);
              }
          })();
          EOF
          node verify_layout.js
