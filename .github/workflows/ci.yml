name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  go-tests:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: admin/go.mod
          cache-dependency-path: admin/go.sum

      - name: Run Go Tests
        working-directory: admin
        run: go test -v -race -count=1 ./...

  js-lint:
    name: JavaScript Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
      - name: Install JSHint
        run: npm install -g jshint
      - name: Run JSHint
        run: jshint admin/www/admin/js/ admin/www/admin/*.js

  integration-tests:
    name: DNS & UI Integration Tests
    runs-on: ubuntu-latest
    needs: [go-tests, js-lint]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build Docker Image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          load: true
          tags: shielddns:test

      - name: Generate Self-Signed Certs for Testing
        run: |
          mkdir ssl
          openssl req -x509 -newkey rsa:4096 -keyout ssl/privkey.pem -out ssl/fullchain.pem -days 365 -nodes -subj "/CN=localhost"
          chmod -R 755 ssl
          chmod 644 ssl/*

      - name: Start Container
        run: |
          docker run -d --name shielddns -p 853:853 -p 8080:8080 -v ${{ github.workspace }}/ssl:/ssl -e UPSTREAM_DNS=8.8.8.8 -e CERT_FILE=/ssl/fullchain.pem -e KEY_FILE=/ssl/privkey.pem -e DOH_PORT=8080 shielddns:test
          sleep 10

      - name: Check Container Status & Logs
        run: |
          # Wait up to 60 seconds for CoreDNS to start (first boot downloads blocklists & GeoIP)
          for i in {1..12}; do
            if docker logs shielddns 2>&1 | grep -q 'Starting CoreDNS...'; then
              echo 'CoreDNS has started.'
              break
            fi
            echo 'Waiting for CoreDNS to start...'
            sleep 5
          done

          docker ps -a
          docker logs shielddns

      - name: Verify DNS Resolution (DoT)
        run: |
          # Install dependencies for verification
          sudo apt-get update && sudo apt-get install -y knot-dnsutils net-tools

          # Wait for Port 853 to be active (Health Check)
          echo "Verifying DNS listener availability..."
          for i in {1..12}; do
            if nc -z 127.0.0.1 853; then
              echo "✅ Port 853 is listening."
              break
            fi
            echo "Waiting for Port 853..."
            sleep 5
            if [ $i -eq 12 ]; then
              echo "❌ Timeout waiting for Port 853."
              docker logs shielddns
              exit 1
            fi
          done

          # Query localhost on port 853 using DoT
          # We disable cert verification (+tls-ca) because we used a self-signed cert
          if ! kdig -d @127.0.0.1 -p 853 +tls-hostname=localhost +tls-ca=ssl/fullchain.pem google.com | grep -q "NOERROR"; then
            echo "❌ DNS Resolution Failed"
            echo "--- Container Network State (Netstat) ---"
            docker exec shielddns netstat -tunlp || true
            echo "--- Container Logs ---"
            docker logs shielddns
            exit 1
          fi
          echo "✅ DNS Resolution Successful"

      - name: Wait for Admin UI
        run: |
          for i in {1..20}; do
            if curl -s http://localhost:8080/admin/index.html | grep -q "ShieldDNS"; then
              echo "Admin UI is up."
              break
            fi
            echo "Waiting for Admin UI..."
            sleep 2
          done

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0

      - name: Cache Playwright Browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-1.61.0
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright@1.61.0
          # Only install system dependencies for Chromium (much faster!)
          npx playwright install-deps chromium
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            npx playwright install chromium
          fi

      - name: Run Layout Verification
        run: node verify_layout.js

  update-manifest:
    name: Update Project Manifest
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14.6'

      - name: Generate Project Manifest & Connection Map
        run: |
          python .github/scripts/generate_manifest.py

      - name: Commit manifest files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add project_manifest.json project_connections.json
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "chore: update project_manifest.json and project_connections.json [skip ci]" && git pull --rebase origin main && git push)

