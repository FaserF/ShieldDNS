name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  go-tests:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: admin/go.mod
          cache-dependency-path: admin/go.sum

      - name: Run Go Tests
        working-directory: admin
        run: go test -v -race -count=1 ./...

  js-lint:
    name: JavaScript Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - name: Install JSHint
        run: npm install -g jshint
      - name: Run JSHint
        run: jshint admin/www/admin/js/ admin/www/admin/*.js

  integration-tests:
    name: DNS & UI Integration Tests
    runs-on: ubuntu-latest
    needs: [go-tests, js-lint]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build Docker Image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          load: true
          tags: shielddns:test

      - name: Generate Self-Signed Certs for Testing
        run: |
          mkdir ssl
          openssl req -x509 -newkey rsa:4096 -keyout ssl/privkey.pem -out ssl/fullchain.pem -days 365 -nodes -subj "/CN=localhost"
          chmod -R 755 ssl
          chmod 644 ssl/*

      - name: Start Container
        run: |
          docker run -d --name shielddns -p 853:853 -p 8080:8080 -v ${{ github.workspace }}/ssl:/ssl -e UPSTREAM_DNS=8.8.8.8 -e CERT_FILE=/ssl/fullchain.pem -e KEY_FILE=/ssl/privkey.pem -e DOH_PORT=8080 shielddns:test
          sleep 10

      - name: Check Container Status & Logs
        run: |
          # Wait up to 60 seconds for CoreDNS to start (first boot downloads blocklists & GeoIP)
          for i in {1..12}; do
            if docker logs shielddns 2>&1 | grep -q 'Starting CoreDNS...'; then
              echo 'CoreDNS has started.'
              break
            fi
            echo 'Waiting for CoreDNS to start...'
            sleep 5
          done

          docker ps -a
          docker logs shielddns

      - name: Verify DNS Resolution (DoT)
        run: |
          # Install dependencies for verification
          sudo apt-get update && sudo apt-get install -y knot-dnsutils net-tools

          # Wait for Port 853 to be active (Health Check)
          echo "Verifying DNS listener availability..."
          for i in {1..12}; do
            if nc -z 127.0.0.1 853; then
              echo "✅ Port 853 is listening."
              break
            fi
            echo "Waiting for Port 853..."
            sleep 5
            if [ $i -eq 12 ]; then
              echo "❌ Timeout waiting for Port 853."
              docker logs shielddns
              exit 1
            fi
          done

          # Query localhost on port 853 using DoT
          # We disable cert verification (+tls-ca) because we used a self-signed cert
          if ! kdig -d @127.0.0.1 -p 853 +tls-hostname=localhost +tls-ca=ssl/fullchain.pem google.com | grep -q "NOERROR"; then
            echo "❌ DNS Resolution Failed"
            echo "--- Container Network State (Netstat) ---"
            docker exec shielddns netstat -tunlp || true
            echo "--- Container Logs ---"
            docker logs shielddns
            exit 1
          fi
          echo "✅ DNS Resolution Successful"

      - name: Wait for Admin UI
        run: |
          for i in {1..20}; do
            if curl -s http://localhost:8080/admin/index.html | grep -q "ShieldDNS"; then
              echo "Admin UI is up."
              break
            fi
            echo "Waiting for Admin UI..."
            sleep 2
          done

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.15.0

      - name: Prepare Layout Verification Script
        run: |
          cat << 'EOF' > verify_layout.js
          const { chromium } = require('playwright-core');

          async function testPage(url, pageName) {
              console.log(`\n========== Testing ${pageName} ==========`);
              const browser = await chromium.launch();
              const page = await browser.newPage();
              const viewports = [
                  { width: 320, height: 568, name: 'iPhone SE' },
                  { width: 1200, height: 800, name: 'Desktop' }
              ];

              console.log(`Navigating to ${pageName}...`);
              
              let consoleError = null;
              page.on('pageerror', exception => {
                  consoleError = exception.message;
              });

              try {
                  await page.goto(url, { waitUntil: 'load', timeout: 60000 });
              } catch (err) {
                  console.error(`❌ Failed to load ${pageName}:`, err.message);
                  await browser.close();
                  return false;
              }

              if (consoleError) {
                  console.error(`❌ ${pageName} failed with console error during load:`, consoleError);
                  await browser.close();
                  return false;
              }

              // --- Design Integrity Checks ---
              console.log("Running Design Integrity Checks...");
              const designIssues = await page.evaluate(() => {
                  const issues = [];
                  
                  // 1. Check for standard inputs with solid white backgrounds (should be dark/glass)
                  const inputs = Array.from(document.querySelectorAll('input:not([type="checkbox"]):not([type="radio"]):not([type="hidden"])'));
                  inputs.forEach(input => {
                      const style = window.getComputedStyle(input);
                      const bg = style.backgroundColor;
                      // Only fail if it's SOLID white (rgb(255, 255, 255) or rgba(255, 255, 255, 1))
                      // hsla(..., 100%, 0.04) results in rgba(255, 255, 255, 0.04), which is fine.
                      if (bg === 'rgb(255, 255, 255)' || bg === 'rgba(255, 255, 255, 1)' || bg === 'white') {
                          issues.push(`Input ${input.id || input.name || input.type} has a solid white background (standard HTML look).`);
                      }
                      
                      // Check border-radius (brand is 10px-14px)
                      const br = parseInt(style.borderRadius);
                      if (br < 4) {
                          issues.push(`Input ${input.id || input.name} has insufficient border-radius (${br}px).`);
                      }
                  });

                  // 2. Check for "X" buttons that don't use ShieldDNS classes or Icons
                  const tagRemovers = Array.from(document.querySelectorAll('.tag-remove'));
                  tagRemovers.forEach(btn => {
                      if (!btn.querySelector('i.fas')) {
                          issues.push(`Tag remover button for ${btn.parentElement.textContent.trim()} is missing a FontAwesome icon.`);
                      }
                      const style = window.getComputedStyle(btn);
                      if (style.backgroundColor === 'rgba(0, 0, 0, 0)' && style.borderStyle === 'none' && btn.textContent === '×') {
                          issues.push(`Tag remover button looks like a standard unstyled '×' character.`);
                      }
                  });

                  return issues;
              });

              if (designIssues.length > 0) {
                  console.error(`❌ Design Integrity Issues found in ${pageName}:`);
                  designIssues.forEach(i => console.error(`   - ${i}`));
                  await browser.close();
                  return false;
              }
              console.log("✅ Design Integrity Checks passed.");

              // --- Modal Specific Checks (if on Admin page) ---
              if (url.includes('/admin/')) {
                  console.log("Testing Modals Design...");
                  const modalIssue = await page.evaluate(async () => {
                      // Force reveal the sections we want to test (bypasses auth/init requirements)
                      const settings = document.getElementById('settings');
                      if (settings) settings.classList.remove('hidden');
                      
                      const modal = document.getElementById('blocked-clients-modal');
                      if (modal) modal.classList.remove('hidden');
                      
                      // Wait a bit for layout reflow
                      await new Promise(r => setTimeout(r, 200));

                      const dateInput = document.getElementById('blocked-clients-date-filter');
                      if (!dateInput) return "Date filter input not found in modal";
                      
                      const style = window.getComputedStyle(dateInput);
                      const bg = style.backgroundColor;
                      if (bg === 'rgb(255, 255, 255)' || bg === 'rgba(255, 255, 255, 1)' || bg === 'white') {
                          return "Date filter in modal still has a solid white background!";
                      }
                      return null;
                  });

                  if (modalIssue) {
                      console.error(`❌ Modal Design Issue: ${modalIssue}`);
                      await browser.close();
                      return false;
                  }
                  console.log("✅ Modal Design Checks passed.");
              }

              let failed = false;
              const issues = [];

              for (const vp of viewports) {
                  console.log(`Checking viewport: ${vp.width}x${vp.height} (${vp.name})`);
                  await page.setViewportSize({ width: vp.width, height: vp.height });
                  await new Promise(r => setTimeout(r, 500));

                  const overflow = await page.evaluate(() => {
                      const scrollWidth = document.documentElement.scrollWidth;
                      const clientWidth = document.documentElement.clientWidth;

                      return {
                          hasOverflow: scrollWidth > clientWidth,
                          scrollWidth,
                          clientWidth
                      };
                  });

                  if (overflow.hasOverflow) {
                      console.error(`  ❌ Horizontal overflow at ${vp.width}px: ${overflow.scrollWidth}px vs ${overflow.clientWidth}px (${overflow.scrollWidth - overflow.clientWidth}px overflow)`);
                      issues.push({
                          viewport: `${vp.width}x${vp.height}`,
                          name: vp.name,
                          overflow: overflow.scrollWidth - overflow.clientWidth
                      });
                      failed = true;
                  } else {
                      console.log(`  ✅ No overflow at ${vp.width}px.`);
                  }
              }

              await browser.close();

              if (failed) {
                  console.error(`\n❌ ${pageName} layout verification FAILED!`);
                  issues.forEach(issue => {
                      console.error(`   - ${issue.viewport} (${issue.name}): ${issue.overflow}px overflow`);
                  });
              }
              return !failed;
          }

          (async () => {
              const results = [];
              results.push(await testPage('http://localhost:8080/', 'Landing Page'));
              results.push(await testPage('http://localhost:8080/admin/', 'Admin Dashboard'));

              if (results.every(r => r)) {
                  console.log('\n✅ All pages pass design & layout verification!');
                  process.exit(0);
              } else {
                  console.error('\n❌ Verification failed for one or more pages!');
                  process.exit(1);
              }
          })();
          EOF

      - name: Cache Playwright Browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('verify_layout.js') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          # Only install system dependencies for Chromium (much faster!)
          npx playwright install-deps chromium
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            npx playwright install chromium
          fi

      - name: Run Layout Verification
        run: node verify_layout.js
