<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Blocked | ShieldDNS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/blocked.css">
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <h1>Website Blocked</h1>
        <p>ShieldDNS has prevented access to this website because it was flagged by your security filters.</p>
        
        <div class="details">
            <div class="detail-item">
                <span>Domain</span>
                <span id="domain-name">...</span>
            </div>
            <div class="detail-item">
                <span>Reason</span>
                <span id="block-reason">Content Filtering</span>
            </div>
            <div class="detail-item">
                <span>Filter List</span>
                <span id="filter-list">Loading...</span>
            </div>
            <div class="detail-item">
                <span>Timestamp</span>
                <span id="timestamp">...</span>
            </div>
        </div>

        <button onclick="returnToSafety()" class="btn">Return to Safety</button>

        <div class="footer">
            <div>Protected by ShieldDNS • Secure Gateway</div>
            <div class="footer-links" style="margin-top: 8px; display: flex; justify-content: center; gap: 12px;">
                <a href="https://github.com/FaserF/ShieldDNS" target="_blank" rel="noopener noreferrer" style="color: var(--accent); text-decoration: none; font-weight: 500; display: flex; align-items: center; gap: 4px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.041-1.416-4.041-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                    View on GitHub
                </a>
            </div>
        </div>
    </div>

    <script>
        function returnToSafety() {
            if (window.history.length > 1) {
                window.history.back();
                // Fallback if still on page after 200ms (e.g. no history or browser blocked back)
                setTimeout(() => {
                    if (window.location.href.includes('blocked.html')) {
                        window.location.href = window.location.origin;
                    }
                }, 200);
            } else {
                window.location.href = window.location.origin;
            }
        }

        const params = new URLSearchParams(window.location.search);
        const domain = params.get('domain') || window.location.hostname;
        document.getElementById('domain-name').textContent = domain;
        document.getElementById('timestamp').textContent = new Date().toLocaleString();

        fetch(`/api/block-info?domain=${domain}`)
            .then(r => r.json())
            .then(data => {
                if (data.lists && data.lists.length > 0) {
                    document.getElementById('filter-list').textContent = data.lists.join(', ');
                    const firstList = data.lists[0];
                    if (firstList.includes('Malware') || firstList.includes('Threat')) {
                        document.getElementById('block-reason').textContent = 'Security Threat';
                    } else if (firstList.includes('Porn') || firstList.includes('NSFW')) {
                        document.getElementById('block-reason').textContent = 'Adult Content';
                    }
                } else {
                    document.getElementById('filter-list').textContent = 'Custom Blocklist / Policy';
                }
            })
            .catch(() => {
                document.getElementById('filter-list').textContent = 'Global Policy';
            });
    </script>
</body>
</html>
